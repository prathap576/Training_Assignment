<!DOCTYPE html>
<html lang="en">
<head>
    <title>gallery</title>
</head>
<style>
    div.gallery{
               margin: 5px;
               float: left;
               border: 1px solid black;
               width: 180px;
              
    }
    div.gallery:hover{
        border: 3px solid orange;

    }
    div.gallery img{
                width:100%;
                height: 120px;
    }
    div.desc{
        padding: 15px;
        text-align: center;
    }
</style>
<body>
    <div class="gallery">
        <a target="_blank" href="./background.jpg" alt="image">
            <img src="./background.jpg" >
        </a>
        <div class="desc">description about image</div>
    </div>
    <div class="gallery">
        <a target="_blank" href="./backgroundl.jpg" alt="image">
            <img src="./backgroundl.jpg" >
        </a>
        <div class="desc">description about image</div>
    </div>
</body>
</html>
